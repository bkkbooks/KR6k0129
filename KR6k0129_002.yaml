body:
  text: 大宋餘杭沙門釋元照撰出家之士稟戒為體聚法居身行必據體而修故因名隨行身必稱法而動故果號法身誠由發趣有宗依因得所故也且夫一識元明垢淨叵得從緣流變彼我熾然觸物生情隨妄興業繫諸有獄受萬類形億劫昇沈罔有寧息故我如來乘真實道闢大慈門將令究盡苦源故制先除漏業譬夫伐樹始必刊枝豈唯種果無依抑使根株漸朽毘尼為教厥致在茲伏自蘊結中天五宗競演譯傳東夏四分偏弘雖九代相承而六師異轍而我祖師示四依之像秉一字之權軫力扶顛為如來所使垂慈軌物作群生導師首著斯文統被時眾莫不五乘竝駕七眾俱霑攝僧護法之儀橫提綱要日用時須之務曲盡規猷是故歷代重之以為大訓然則理致淵奧討論者鮮得其門事類森羅駕說者或容遺謬由是研詳可否搜括古今罄所見聞備舒翰墨仰承行事之旨題曰資持不違三行之宗勒開卷軸良以一部統歸三行三行無越二持科釋文言貴深明於法相銓量事用使剋奉於受隨是則教行雙弘自他兼利首題一舉部意全彰但由聖智通宏凡情寡陋以䗍酌海長嗟罔測其深捧土塞河實愧不知其量式酬祖德少副夙心庶永流通冀裨萬一者爾歷觀往古述作凡五十餘家各謂指南俱稱盡理然今所立頗異昔傳故於卷首略標五例一曰定宗二謂辨教三敘引用四明破立五示闕疑初定宗者三藏分宗所詮乃異據行則雖通兼濟在教則各有司存往哲未詳固多濫涉竝廣談論學以亂律乘即增輝等記隨文結釋涅槃四果等竝依法相廣列章門是也況復所引之論多依俱舍婆沙蓋用實宗釋今假部可謂宗骨顛倒理味差僻致令後銳枉費時功忝在傳持義當糺正故今言教則唯歸律藏語行則專據戒科決持犯之重輕建僧宗之軌範此為正本餘竝旁兼猶恐專隅更須明證戒疏大妄戒中斥古云有人依解廣竪義章動經他日意所異也舉宗以明持犯為正自餘隨律之經略知名相而已諸經論師自分宗體彼尚不解律刑此豈橫知他學縱有前聞亦不得述費時損日徒張無益自宗猶困於未聞況餘經論何由道盡可謂不識分量也須臾死去莫浪多事等已上全文請考斯文足為龜鏡宜須反跡勿事氷情二辨教者夫教者以詮表為功隨機為用雖廣開戶牖而軌度無差雖剋定楷摸而攝生斯盡圓音隨應情慮難求且依業疏三宗以示一家處判然教由體立體即教源故須約體用分教相一者實法宗即薩婆多部彼宗明體則同歸色聚隨行則但防七支形身口色成遠方便此即當分小乘教也二者假名宗即今所承曇無德部此宗論體則強號二非隨戒則相同十業重緣思覺即入犯科此名過分小乘教也三者圓教宗即用涅槃開會之意決了權乘同歸實道故考受體乃是識藏熏種隨行即同三聚圓修微縱妄心即成業行此名終窮大乘教也然今四分正當假宗深有兼淺之能故旁收有部教蘊分通之義故終會圓乘是則大小通塞假實淺深一代雄詮歷然可見三引用者自古引文多無楷式或全寫經論或具錄祖乘或汎列儒書或多援字解既乖鈔旨實穢真宗今意所存類分三別初用三藏意聖教繁富未可具舒事鈔建題撮要為本故下序云自外不盡之文必欲尋其始末則非鈔者之意今或申明幽隱或讎校差違竝具引正文仍隨難注釋自餘易曉例不廣之二明用祖教者謂疏鈔傳錄儀集圖誥部文既廣非學不知其或以後廢前或指廣如彼或斥奪謬妄或和會異同諸餘義章例亦不舉三用俗書者莊嚴章句違律刑科讚詠外書如經極誡祖乘有用義不徒然或是舉俗況道或復取義助文豈得專事浮華混同世論今或語勢相涉或借用彼文但撮要示之令知所出及論字體多從義訓兼復通依眾典不必專據字書四破立者慈訓遠流傳迷彌眾考教義則綱領俱喪逐名相則得失互彰必委而攻之則過成繁費苟縱而不舉則人惑多岐至於大義有妨或復異計難革但隨文略指使理有所歸逐事爭鋒甚非今意五闕疑者斯鈔大體詞簡事周淺識寡聞何由盡曉竊恐相承傳濫或是抄寫乖真或詳覈未通或撿尋未獲義非臆度例竝闕如或但標曰未詳或且俱存眾說或擬尋文據或俟後講磨蓋遵聖論推本之懲抑憑祖教廢前之例故也覽斯五例臧否條然且舉大端餘廣如後釋序題四分者五部之別名一宗之通號從文段數即以為目翻就此方總六十卷新學多昧委引示之初分二十卷從序至第二十比丘戒本第二分十五卷從二十一至二十八八卷比丘尼戒本受戒犍度一二十九至三十三五卷梵語犍度此云法聚即篇品之名說戒犍度二三十四五二卷此兩犍度在第二分末第三分十四卷總十六犍度安居犍度三三十六自恣犍度四三十七皮革犍度五三十八衣犍度六三十九四十藥犍度七四十一四十二前半迦絺那衣犍度八四十二後半拘睒彌犍度九四十三前半從國為名瞻波犍度十四十三後半從城為名訶責犍度十一四十四人犍度十二四十五前半覆藏犍度十三四十五後半遮犍度十四四十六前半破僧犍度十五四十六後半滅諍犍度十六四十七尼犍度十七四十八法犍度十八四十九第四分十一卷前有二犍度并後結集等四段房舍犍度十九五十雜犍度二十五十一二三共三卷戒疏云二十犍度離分三分是也五百結集五十四前半七百結集五十四後半調部毘尼五十五六七共三卷毘尼增一五十八至六十三卷以法正尊者於根本部中隨己所樂采集成文隨說止處即為一分凡經四番一部方就故號四分非同章疏約義判文故業疏云四分即說之斷章斷字上呼止也戒疏云四度傳文盡所詮相此據說之所至非義判也二十犍度離分三分可是義開耶問教流此土四律已翻四五十祇祖師何意偏宗四分答此土受緣始從四分餘部雖翻未聞依用業疏云神州一統約受並誦四分之文今所判釋約受明隨故立一部以為宗本下云今判其持犯還約其受體斯意明矣義淨三藏反宗有部未體此意問有引人法有序等文而云四分部勝其義云何答非無此義必依十誦受戒可以部劣而宗四分耶序明勝劣為彰部計淺深至第三門始論約教判處耳問且據現翻總六十卷梵本仍多如何四度誦終一藏答非謂一座名為一度蓋取一期不定時限隨集至處未終且散即為一度如是至四一部方終五分十誦大同於此唯八十誦律一夏之功逐席為目隨時各立未可一概律者梵云毘尼華言稱律今約戒疏統括諸文不出三義初言律者法也從教為名斷割重輕開遮持犯非法不定下文云又如世法據刑約制道法亦爾依根附教各有差降不可乖越故曰法也二云律者分也謂須商度據量有在若律呂之分氣也一年十二月奇月屬陽名律偶月屬陰名呂一律一呂各分二氣則二十四氣又云教相所詮四字斯盡謂犯不犯輕與重也若解四字通決無疑是則上品持律之最何名為犯境緣具也何名不犯起對治也何名為輕因果微也何名為重反上句也然此四相非律不分持犯不濫有同氣候也三云律字安聿聿者筆也楚謂之聿秦謂之筆出字書注必審教驗情在筆投斷又云處刻決正非筆不定等問如上三義何以分之答三竝世法比擬取名教詮楷定即法義也辨析重輕即分義也臨事決判即筆義也具含此三故稱為律自餘翻釋廣在中卷刪繁補闕者刪謂能刪繁即所刪補謂能補闕即所補世多不曉故須委釋即分為二初刪繁者自古傳律情見不同或疏或鈔十有餘家口相傳授亦非一二凡於一事解釋多途必備而引之則翳於行事但直申正義餘竝削除止用一言標破如云不同前解諸說不同餘義廢之昔解多途等今以標破之言謂之能刪屬在刪字削去諸說竝號所刪屬於繁字上據義說更須文證鈔興意云每所引用先加覆檢於一事之下廢立意多諸師所存情見繁廣今竝刪略止存文證等問繁有幾種答略有二義一者繁廣即上所明諸師情見刪除之者如自然定方七樹七間戒場先後夏中結解受日限定等並有多說今於鈔中例皆不引即義鈔兩疏所引古解者是二者繁濫如欲詞牒緣受日加乞之類今竝除之即羯磨篇云今欲剋剪浮言發揚聖旨等又如知鐘之語說戒淨口安居通聚自恣為非僧網篇中廣列非制師資篇中妄行杖罰之類即僧網云今則刪其繁惡補其遺漏等若依序文正存前意今取後說非不兼通縱有多述不出於此問上明所刪為律為疏答自昔不明去取兩異今為分之謂本宗他部大小經論西土此方先賢文紀諸家鈔疏但使今鈔引者竝是取文皆屬鈔字至於諸師情見或筆於文或傳於口今鈔不錄削除之者並是所刪即刪繁字攝應知刪補之義鈔文前後時或有之豈得凡見引文例稱刪補傳迷來久學者深須究之問如戒本緣起廣解辨相律藏文廣今鈔不引豈非刪律答律是聖教今家所宗但可取文豈宜刪去一者下文指廣如律并及大疏何得率爾例斥為繁二者鈔興意中但云情見繁廣不云刪律一家宗部並無此語如何不思輒見輕謗若爾說戒篇云今以普照道安二師為本餘則取律誠文刪補取中豈非刪律答此迷語也彼以古師儀式有闕有繁故憑本律刪彼所繁補彼所闕是則繁闕在二師之本刪補屬今鈔之用據斯以言彌彰上義問若不刪律應即刪疏答但是異端或文或說豈局於疏及乎取彼要當還屬鈔取自餘不引始號刪繁故鈔興意中但云情見不言疏鈔也二明補闕者自古持律或隨已執見或暗於教部至於行事未適時宜如尺量短長由旬大小羯磨例皆白讀問難不取解知臥具謂非三衣畜長不科減量淨地不立唱相七證全無請詞斯類極多例皆遺闕今鈔約義準文補令詳備故下房戒定尺量已云余曾遊晉魏及以關輔諸方律肆每必預筵至論尺斗廢興曾未霑述故即補闕反光九代印本作故即刪補然既未霑述豈得有刪今準古本為正今以往古未論之事即為所補鈔中所引文義理例是為能補問補闕與下文義決通為同為異答決通通先有補闕局元無餘如序中第五門說問隨機羯磨云律藏殘缺義有遺補豈非補律答正由律缺行事不周故引文約例補彼羯磨至如律文仍前自缺何嘗補之問輕重儀云刪補舊章撰述事鈔準此刪補不在於律如何不許刪補章疏答所刪所補多出舊章能刪能補並見今鈔但章疏語局情見言通口授文傳理無不攝請詳鈔意勿事遲疑行事者行以運造為義事即對理彰名然事相多途義須精簡初以事通善惡此唯善事二就善中簡餘泛善局明戒善三約上下兩卷眾共二行名作善中卷自行名止善四約諸篇細分諸事上卷十二篇標宗一篇總勸行事集僧已下有五事初眾法緣成事集僧足數受欲羯磨結界五篇二匡眾住持事僧網三接物提誘事受戒師資四檢察清心事說戒自恣五靜緣策修事安居中卷四篇有二事初專精不犯事篇聚釋相持犯二犯已能悔事懺篇下卷十四篇分八事初內外資緣事二衣四藥鉢器二節身離染事對施頭陀三卑己謙恭事僧像四外化生善事訃請導俗五待遇同法事主客瞻病六日用要業事雜行七訓導下眾事沙彌及尼八旁通異宗事諸部是則一部始終所詮行相無非三業鼓動方便緣搆而成故云行事首題標此特異群宗本設化根源正教詮宗骨反光九代斯言不虛故序云顯行世事方軌來蒙者百無一本此乃一家大要遍見諸文凡預學宗彌須詳練苟迷斯旨餘復何言問準下持犯事法兩分今唯題事則非攝法答彼明止作各攝分齊故須兩分今望運造無問事法通歸事耳問題云行事下云三行語音別召同異云何答行據造修行取成德由行成行語別義同莫非流入行心緣構成業也鈔者有二義一採摘義二包攝義謂於三藏正文聖賢遺記採拾要當以為文體下云撮略正文即初義也彼文既廣備錄則繁故於其間略提首後詞省理足下云包括諸意即次義也至第十門當自廣說序有三訓隨義以釋爾雅云東西牆謂之序如世牆序在堂奧之外即喻序文冠一鈔之表此端序義也二序即訓敘謂撰述始終十門例括三行條流使一部文義歷然不混此即次序義也三訓緒者如繰繭得緒則餘絲可理學者觀序則諸篇可求此謂由序義也一言標序三釋並通問昔云總別兩序其義如何答首標一題那云兩序今所不取略言三失凡言總別共彰一事如持犯總別二衣總別之例今序不爾前明製撰成文後括諸篇大義前後敵異總別焉成若以十門不同而云別者則總義持犯所列七門亦應是別戒業二疏各有總義並列多門例難亦爾此則全無總別之義為失一也又倣經宗通別二序且經中通序通於諸經別則簡於餘典今此鈔序為通何文為簡何典又以總序為發起別序為證信者且彼經家通是證信別為發起今則反之一何顛亂若言準彼得云兩序者彼以通他局此之異經後經前不同證信使百世無疑發起顯教非徒設科分二序其意在茲考此序文全非比擬妄引彼例為失二也且鈔以十門統其大綱又云此之十條並總束諸門等是則十門全無別義不曉文旨為失三也今申正解對下三十別篇止可通云總序於一序中大分三段前明著述但敘能詮之文中列十門乃括諸篇之義文義二種並屬教收教不徒然指歸濟行故後分三行統攝群機一序始終教行斯足略示大要餘在臨文題下注字顯上別名容含多意一者異古下斥古云顯行世事方軌來蒙百無一本今標行事得律宗旨二謂揀濫古師撰述皆云四分律鈔疏等故加別目知非餘者三為釋疑疑云宗律撰鈔但以所宗立題可矣何必更參刪繁等語若不注顯疑情不決故也中下兩卷語別意同撰號中本為標名示文所出名容相涉別之以寺寺或同名揀之以處京兆者即古長安城今之永興軍也自古帝王建都之地故立此號京者訓大言土境之廣兆即是眾言士庶之多即律師行化之境亦即本所生地有云長城或云丹徒者長城湖州丹徒潤州此謂祖宗之所出非生處也行狀云大師在京華生長足為明據其出世示滅中間化事備載行狀此不煩引撰述者通而為言撰亦是述今既兩標故須別釋撰謂操觚染翰詮次成章述謂謙己推他相循舊轍若準後批云武德九年撰而戒疏批云貞觀初年以武德九年即改貞觀故無所妨彼疏又云貞觀四年遠觀化表於泌部山為擇律師又出鈔三卷乃承吾前本更加潤色筋脈相通準此乃是重修前本案目錄中乃當貞觀八年即今所傳之本也舊云有六卷又云後分十二卷準下序云三卷攝文文無不委則是非見矣釋序文初段歎戒中初二句標歎為下釋成又二上二句舉喻彰德依下四句對餘藏顯勝戒德即所歎之法難思乃能歎之詞戒有四義法體行相今從總相唯歎戒法所以不云難議者以心思切近口議疎遠思之既難必非可議或可句局理必兼之冠下一句顯上難思之義既超象外無物可比故非凡小心力所及冠字去呼謂束載也冠為首飾取高出之義象謂世間諸所有物問軌導舟航豈非象耶答經律歎戒舉象雖多但得少義未可全同此中略舉二物少喻戒功軌導即車轍明其發趣也舟航取其運載也又標宗云是汝大師以能軌物也或如人足能有所至也或云大地生成住持也道品樓柱聖道所依也禪定城郭定慧所憑也乃至如池如鏡如纓絡如頭如器又智論中如重寶如命如鳥翅如船等尋之可知又篇聚中先明戒護具列八喻如王子如月光如如意珠如王一子如人一目如貧資糧如王好國如病良藥又戒本序如海無涯如寶無厭僧祇戒本如猿猴鎖如馬轡勒廣在經律不復繁引良以戒德高廣故非一物可喻遍舉諸象各得一端不能全似故云冠超也五乘者人天聲聞辟支及佛能乘人也五戒十善諦緣六度所乘法也乘此法者必由奉戒故以戒法通為軌導也常途如此今別解云如戒本中欲得生天上若生人中者常當護戒足豈唯五戒十善耶然戒有四位五八十具若約鈍根通為世善若論上智俱作道基故善生云五戒甚難能為大比丘菩薩戒而為根本故知四戒皆導五乘今此標歎總含四位正在具足問戒疏云為道制戒本非世福但據三乘今云五乘者答彼則專窮聖意用顯教源此明通被兩機以彰利普然則三乘為語尚乃兼權若論雙樹重扶咸歸常住故知四戒皆導佛乘根器不同故分三五如是知之三寶舟航者三寶四種一體理體就理而論化相一種局據佛世住持一位通被三時功由戒力運載不絕故如舟焉何以然耶由佛法二寶並假僧弘僧寶所存非戒不立如標宗中順則三寶住持違則覆滅正法又如華嚴云具足受持威儀教法能令三寶不斷等餘如後引或可越度凡流入三寶位必須受戒以合舟喻文通此釋前解為正寔字音植訓實訓是次顯勝中有二初對二學明所詮行勝下對兩藏顯能詮教勝定慧莫等者須約兩意互明勝劣若望斷惑證真則慧為勝戒但止業定唯攝散故若約修行次第必戒為始禪定智慧因之而生故今云建修正從後義故云莫等遺教依因成論捉縛並同此意次顯教中群藉即目經論二藏於茲乃指住持之事經論不談故云息唱謂剃染稟戒入道次第以至僧中受懺安恣結說治諫師資上下行住坐臥飲食衣服眾法別行此諸事相佛法紀綱住持萬代功由於此唯斯律藏委示規模餘藏非宗故所不辨故善見云毘尼藏者佛法壽命毘尼藏住佛法方住曲論來致備如中卷準上所詮亦須兩釋若詮理發智破妄顯真則經論為勝若軌事攝修滅惡生善則毘尼獨尊故知三藏各具勝能今望住持故有優劣問標宗所引大小經論亦明戒律那云息唱答雖復兼明號隨經律止是略歎戒功至如上列住持等事非彼所論故得云耳敘弘傳中初文正法像法各一千年末法萬年如來定在正法四依通於正像文為二段上明教主親弘下明弟子傳化住法圖贊列二十五祖即以如來為開法大師迦葉已下為傳法聖僧今此戒律佛出方制本其元始故云自也大師者所謂天人之師即十號之一以道訓人故彰斯目然以師通凡小加大簡之是則三界獨尊九道依學唯佛大聖得此嘉號自餘凡鄙安可僣稱故十誦云若比丘言我是大師說大師事法得蘭夷罪同大妄故言我是犯蘭說事法得夷言在世者娑婆五濁所取之土也大千世界所化之境也賢劫中第九減劫人壽百歲出世之時也三十成道說三乘法度人無量八十唱滅今指五十年中行化之時故云在世言偏弘者謂雖談眾典然於毘尼最所留意故篇聚云世尊處世深達物機凡所施為必以威儀為主是也又經通餘人所說律唯金口親宣大權影響但知祇奉況餘小聖安敢措詞又復諸經說有時限律則通於始終義鈔云始於鹿苑終至鶴林隨根制戒乃有萬差等具斯三意永異餘經偏弘之言想無昧矣爰即語詞此明如來滅後迦葉而下結集傳持故云無普普即廢也言四依者凡有三種一人四依內凡為初依初果為二依二三兩果為三依四果為四依涅槃云有四種人能護正法為世所依此並大權示聲聞像傳法化人眾生所賴四並名依二行四依糞掃衣長乞食樹下坐腐爛藥此四種行入道之緣上根利器所依止故三法四依謂依法不依人依義不依語依智不依識依了義經不依不了義經此之四法簡辨邪正末世所憑故得名也今此所標即人四依昔來但列二十四祖今意不爾二十四師且據相承傳法之者若約橫論同時弘闡人實非一毱多五子豈不明乎就竪而言師子已下豈無傳教況復下云逮于像季則知四依之言兼該正像弘法之師豈唯二十四人而已二十四師名字化跡廣在付法藏傳及住法圖贊須者尋之像季弘傳初科明兩土中如來中夜入滅後夜不如正法像法益多乖諍況像季乎如感通傳天神所述西方諍競大小不融至於經卷互相投毀及空有兩宗各分黨類若論此方隋唐已前五部未分假實未判是此非彼各尚己宗故多乖諍以下文中別指震旦故知此科通語兩土然祖師出世當佛滅後一千五百餘年即入像法之末是故齊此以明訛替澆謂澆薄醇味漸微訛謂訛變本體全失時實不然由人故耳鋒即利刃世中兵鬪謂之爭鋒脣舌相攻以圖勝負事有同焉鼓謂擊動論即言議事無形質顯是虛諍故云不形次科傳教失中初文上既通敘兩土澆訛下不別敘西方蓋非今意但明此土引生述作因前而致故標所以震嶺者震是梵言之省略嶺即土境之通名如世州郡多以江山川澤通而召之又如釋相云震嶺受緣即明東夏得戒之始耳又僧傳中贊曇延法師云震嶺宏標遺教法主準知震嶺之號但目此方不煩穿鑿舊云國嶺兩標震是此方嶺即葱嶺非也具云震旦亦云真丹此翻漢地傳教者指弘通之人九代者自後漢明帝佛法初傳至於大唐祖師出世凡歷九代後漢魏晉宋齊梁陳隋唐草之出叢曰拔萃人之超群曰出類語出孟子有若歎孔子曰出於其類拔乎其萃自生民已來未有盛如孔子也今借用之事出胸襟謂之智術此明前代諸師任意自裁不憑正教上句彰其英敏下句斥其師心列失中凡傳教之務不出有三一弘揚教法二訓誘來蒙三扶持顛墜今觀前代於此三事曾未論之故下結云可得詳而評之蓋言不能詳評故也是以文中科為三失初揚顯下二句闕第一也行儀謂行事軌式以像末之教不顯行儀安能久住匡謂正其訛駁攝謂持之久永垂下二句闕第二也以後學無知若非師範進道無由尋即法也紐下二句闕第三也玄綱大表竝喻律乘紐謂接續既即已也樹字上呼顛即是倒此二句舉喻雖別所顯義同結示中上句躡前智術既無典據故云憑虛下句躡上三事不能詳評故曰難為以即用也形謂構其相狀聲即發其言詞露潔猶言顯白也任情虛說無教照對故易軌行實事是非外彰故難上約虛實相對釋次就理事釋者有解云上句指虛通理性即經論之學下句明軌範事相即毘尼之教彼引僧傳僧休法師聽洪律師講四分律三十餘遍顧諸徒曰予聽涉多矣至於經論一遍入神今聽律部逾增逾暗豈非理可虛求事難通會乎又引戰國策云畫鬼魅者易為巧圖犬馬者難為功又云淄州名恪律師親問南山即以此對未知何出此謂諸師談經說理無不精窮考律行事未能決白此釋可取故兩存焉次彰講解斥學解中初科又二初至繁濫正敘執文上二句標執下二句顯過前修即指前代諸師律藏且據本宗一部每有行事必據誠文雖是實錄然由年代渺邈五師捃拾翻譯失旨抄寫錯漏致有殘缺不了之文今家則用文義決通如下所標律文不了是也寄緣猶附事也良即訓實以文害事故有繁濫如依律羯磨各差五德有覆不開懺重夏竟解界二十八人不足數四人捨墮之類加以下次明兼生妄計初句標過濫之源為學有二一須研味精詳二必聞見廣博既乖此二故多虛謬臆下三句出其過相臆即胸臆言其任意尤即訓甚如手持衣藥執臥具為越褥之類取類者或引類例有乖如小界立相引僧祇捨衣界一尋為例無衣鉢得戒以破戒和尚四句為例等或取流類不等如用僧祇加衣法及用解大界解小界羯磨而解戒場等隨聞即用不究可否故云寡討論也愚執畢身不能遷善故云生常計也寡即訓少集即是聚言其多也次科有二上明辨罪據別行也下云眾網約僧事也釁戾皆目於罪展轉增多各據一見故曰倍分加盜僧物得重而言犯蘭無知得提例判為吉此則以重為輕盜畜物犯吉而斷犯夷捨墮物貿新衣得吉而云犯提此謂以輕為重也僧事中如僧網治罰說戒自恣受曰懺罪諸餘眾務一方行化立法須通任情則事派千差依教則理歸一揆既迷教旨義無所憑朋黨者則同憎嫉者故異世途目擊今古皆然故云同異等區亦分也三中因前異計執諍紛紜是非難定遲疑不決故推博學深識方能裁斷文中初二句簡其堪能上句明精窮律藏教有廢興偏局之者固執成諍下句明評量諸師釋說多異後進未達取捨莫從必具二能方堪此任故云自非等孰能下顯餘人不能闢即開也重疑者謂展轉生疑如執夏中不得解界人已生疑因又疑曰必若解之為成夏否又如執一夏三度受日疑云必欲重受為失夏耶又如小界立相疑云必行受戒為得戒否略舉數端以遣文相凡此之類隨時引之大論疑者事既不明任運滋廣故云重疑遣猶除也累字去呼謂滯礙也心既有疑事即成礙人無不爾故云通也或作罪累釋者如執夏末受日十五限滿不還成夏又七日藥開無內宿盜常住物令奪取等足使人疑依行有罪必決其疑則令離過故云遣也此二句對上考諸說虛實括下二句對上統教意廢興部執且指五部五師情見岳立不同若偏守一宗則必成諍論故須統括考校異同斟量取捨方明行事故云爾也與字平呼即語詞也此四句二事古作四義釋者非次明撰集別斥中初科上二字傷歎前下敘其虛費上二句總示所出遺記者通目疏鈔如第十門具列者是下二句別列非相言止論者貫下兩句謂撰疏者但相廢立作鈔者唯逞難問更無他意故也如義鈔兩疏時或引之是也問此中既斥彼那引之答此明行事故須奪破彼演義章不妨引用又古文極繁彼唯摘要取其少分以辨是非所以義鈔題云拾毘尼義是也至下斥其失宗行事訓蒙毘尼宗體於茲既失餘不足言今鈔首題即彰此意高超遠古深契佛心紐絕扶顛誠在於此是以諸篇演布唯存行事為宗隨處提撕專以訓蒙為意咨爾來學勿負祖恩言世事者謂是世中合行之事非世俗之事也準下撰述一十六師今云百無一者汎舉至多以明至少猶不可得言都無所取也次義集者即諸本羯磨以羯磨文散在廣律並以義類集結成篇故云文在義集如今隨機羯磨亦稱撰集又業疏中召出羯磨人為集法者皆可證矣此科文意為遮後疑恐云上斥疏鈔繁費乖宗且諸本羯磨直顯行事如何上云百無一本無乃誣彼先賢耶今雖許有還成無用言時有者明其不多也銳懷者美其敏利也即目鎧諦光願四師上標人法或下指過初二句即光願二本光本多以義求願本廣引緣據詞繁事隱不濟時用故云多列等閑緩非要謂之游詞好廣者樂從尚簡者不顧故云逗機未足逗猶濟也次單題下即鎧諦二本上二句斥文略題即書寫彼唯出法不辨緣成故云莫宣猶言不述也下二句明無用既不曉成敗加被無功故云依文等故業疏序中總斥四本云增減繁略互見得失等昔來所釋都無所曉總斥中通前疏鈔及以義集故云並也碎謂文無章節亂謂義非倫序所以下二句對上文碎故難尋求次二句對上義亂故難領會第二明今述作初文為二初明覽古聽采暇者在首師講席習學之時顧眄者明非正學也迴觀曰顧斜視曰音麵群篇通指前代所流也撰集雖眾一無可取故曰通非等屬音燭訓當非當意者不契祖心也上句示無取下句出所以問劣則可爾優何不契答以群篇中優劣互見優雖有取劣不可存欲得全優未之有也云非屬意其義如斯慈訓所興良由於此斐然下次明撰述斐然者文章駁雜之貌次出論語孔子在陳思魯乃云吾黨之小子狂簡斐然成章作命即撰文命謂典章之異號即目今鈔也論語云為命裨諶草創之等正義曰命謂政令之詞為即作也直筆者即後批云不事虬文此有三意一顯行事故二被新學故三彰謙意故具謂委陳行相舒謂演布文詞一部之文盡於此句有科此為刪四分繁包下為引他文補非也次科引用中為二先列所引文有四句初句統収諸律即五十祇等次句收大小乘經經中談律名為隨經之律故云隨說第三收大小乘論第四總諸師疏鈔及布薩儀高僧傳師資傳寺誥等此之四句括盡一部引用之文是則貫攝兩乘囊包三藏遺編雜集𭟎聚成宗以鈔標題義見於此搜下次明取捨又二初二句取捨三藏搜謂摘取駁即簡除言同異者初約本宗他部同異相對以明搜駁有四句一與本宗同故搜十誦持衣加藥諸部不足數人婆論三衣局量五分通量母論轉欲之類二同故駁魚肉正食小教咸爾今鈔用後廢之三與本宗異故搜僧祇五人捨墮在眾自說欲五分通結淨地諸部自然界量母論略說戒等四異故駁僧祇三遍說欲牒緣入欲通夜會衣不立勢分群部不開淨地增加羯磨如是等例次就他部自明同異亦四句一他部同故搜者五分僧祇於上座前一一說欲十誦多論盜畜物犯吉之類二同故駁十誦善見無和尚得戒僧祇十誦四重無重犯三他部異故搜善見三衣內穿失法婆論緣斷雜寶藏俱盧舍五里多論二里竝取用之四異故駁十誦受三十九夜僧祇事訖委如別行中尋之長見下取捨諸師文紀何以知然以三藏聖言豈論短濫義可見矣初二句明取者如下諸篇所引疏鈔解釋問答多不標名至於僧傳寺誥等各題本號此明取文皆屬鈔攝昔云補闕誤矣輔即助也濫述下明捨下諸篇中或直剪者如云七樹七間如義鈔廢立或引破者忘成及界不開中安居解界失夏等又布薩儀中唱未受具人不清淨者出等出要律儀禮敬捉衣角之類若不剪除人情滯塞故云成通意也次體勢中初別列有四句初句明繁者或作繁廣釋上卷諸篇廣張行事中卷盜戒離衣畜寶別眾食等下卷二衣四藥導俗沙彌等或作繁累釋如結界唱相有場無場兩種大界竝先委示正唱復出受戒遮難亦先釋相出眾對眾復兩列之說戒懺殘並前廣引諸教然後還引前文排布儀式上就當篇各明若約別篇互望亦有此義如結界篇重明集僧又羯磨篇中復列集僧結界簡人受欲等及受戒篇還述集僧等釋相篇復明受戒具緣等釋相對施兩出五觀食法等如是並為顯於行事不可闕略即下所謂若略減取其梗概用事恒有不足是也第二略指者初約諸篇互指如集僧指結界在後結界指集僧如前說戒指白眾在僧網安居指五利如自恣羯磨中簡眾與欲並指前篇又各就當篇明者如足數中指四儀別相廣如別眾懺殘指覆藏如後如此相指遍該一部且舉一二類謂同流從即訓順如安居竟合明迦提五利不欲更繁然夏竟受利與下自恣同流相順故指如彼餘皆倣此又釋如無場大界已出結法後有場大界即指如前乃至加三衣法具出一法餘並例指受日中出半月羯磨已一月如前此釋亦通不無其義三文斷者如受欲中明說欲相引五分僧祇文斷已續云義評等下諸篇中義云義曰義詳義準等皆同此例古解云云一無可取四徵詞者即推覈之語謂推覈深隱必假問端以為發起汎論問答為立賓主賓則申疑推究主則隨義決通欲使言議相持教理明顯一咨請問即結界中諸問如云大界有村得合結否二假疑問受欲中問不稱緣欲法成否羯磨中問白讀成否等三破古問集僧中問自然方圓足數中問邊罪等人自言據體等四相並問受戒中問戒師白和教授不和又問戒師不差教授濁差五推窮問受欲中問此律宿欲不成及受戒中問十誦尼無重出家何故開捨戒六互違問釋相問毘尼殄已起戒防未起何言斷過去非盜戒問盜像供養無犯盜經結重等諸篇之中所有問答不出此例文中一句改無不盡上來四句總括一部文體大要意使預知至文不惑今更以四句助顯其意初句繁而不費次句略而不闕三參而不亂四幽而不隱如下通結如是者指示之詞謂上四種遍在一部不使前後義有相違故云始終交映又除顯事用不令前後文有繁複故云隱顯互出交亦是互映即照也會異中前明引用之意次彰撰述之體至於所引群部法事若法計非本宗容生疑濫兼復示之故云并也初四句列相並皆下顯意初明羯磨對世寡用故曰見行眾法多據本宗別法多出諸部今文通收他部眾別之法眾法中滅擯通結淨地出五分沙彌分衣法出十誦別法如持衣加藥等出十祇諸務言通須收諸篇所引他宗之事下二句即指導俗沙彌篇中諸事由此二篇多集群部少出本宗故別會之尋文可見既並他部收歸本宗故云攬為一見等此宗者若對餘部即指四分若對諸家即歸今鈔一家行事費功有二一昧教妄行則費行功二文散難求則費學功勒卷中初科遮異說者或當時實有或假設預防若比諸師行事義集似傷繁細然不達深意故須明之後世有作行事策者甚非祖意同我異說並指他人情見有順違也如世歌曲其和者必擊物以聲其節節謂曲之大段故云大節斥猶責也文繁誰所下示意樂好也獲得也何下轉釋不已所以初徵起若下正釋初明須繁必下顯非繁梗概猶粗略也橫評謂非理多說諱即避忌鈔以撮要包含為義不急之言非所宜故今意中圖度者以智斟量取中者離繁略過務省約者是鈔正宗救急備卒是今正意眾別行相不可暫忘故云急也事起不常無由措手故云卒也師資篇云故拯倒懸之急第十門云庶令臨機有用斯即急卒意也中字乎呼如上釋也或可去呼謂允當也是知斯典一文一句無非要行片無閑詞嗟夫末世昏愚志性下劣唯誇講說專事唇吻重輕篇聚身無不為戒定修治曾無一念致令慈訓棄若朽遺救急之言於茲喪矣但恐苦輪之下欲罷不能聖道之中進身無日有識英俊寧不動懷指闕中思即籌慮贍猶濟也固即訓實行詮即諸義解此明今鈔專列時事義章辨論有不濟者例皆不引委在餘文故云於後上卷多指義鈔中卷多指戒疏上下多指業疏凡所指略皆此意耳如篇聚中二不定七滅諍皆先提大意已乃云文義既廣徒勞宣釋終未竆盡故略不述等釋相中四違諫戒意亦同此故云略標等示所詮中眾務謂四人已上羯磨僧事成謂能辦用即舉行遵即奉持之心機謂時須之急託事即衣藥等緣並下結示無闕紊音問亦亂也如古所傳三卷三位即名眾自共三行今更以義判略為三別初約止作上下對事造修名作持行中卷守戒離過名止持行二約眾別上卷僧務名眾行中下自修名別行三約純雜上中各局故純下卷隨機故雜至論互相投寄不無相兼且據大途如上所判分篇敘意中初明難判人為能行事是所造故云境事科謂分節擬即度量今下正分言物類者今先舉示如安居分房釋相明法體懺六聚中明事理兩懺二衣分亡人物導俗明說法儀沙彌中出家業及七篇中所注法附若據篇題實非該攝然夏中分房同安居類故但標安居其餘自攝餘皆準此是則三十首題並據一篇之主耳若爾何以有注法附或不注者答有親疎故列名中據從敘意之下即列篇名則文理相貫然以十門生起間之甚有不便古科列名在十門之首釋云為顯諸篇是十門所括今謂不爾豈有敘致於前列名在後況勒卷分篇次第有序今詳至於已下二十二字合在列名之後則使篇名接前敘意生起冠後十門文次義顯永無疑濫今文倒亂恐是傳誤豕亥之訛古今皆爾以理為正豈不然乎講者至以標名首已即讀篇名入後十門覆讀生起大段第二諸篇大綱敘意中統大綱者諸篇事相皆別目故言條流者總中別相義類異故上二句即顯前文但敘述作不明義例故云未委更以下生後意括謂包收鏡明也遠詮謂教相大旨將釋十門略知次第大聖立教為顯一乘欲使群迷咸歸實道不堪受化暫用權方適物隨宜凡心叵測然則將傳遺教必曉來源俾夫學有所歸行非虛造教興之意故在初明既達此門粗知來旨何因制度輕重不倫故次明也上列二門通論律藏宗部既別教相莫融必有事興依何處斷故有三也雖知用教約體有宗此土受緣並遵四分或於本部攝事不周餘部誠文如何取用故有四也上且據文文容乖闕乖須義定闕必文通廢立既難須明軌式故有五也已前辨教並約能詮教不徒施必詮正行行非一轍須指大宗故有六也上來六意教行具彰教行被機機分多異故七八九通局次明前之九段機教兩明頗彰化意然教傳此土真偽相參若不甄除容生疑濫又斯文之作特異前修元意所存來學須曉故次第十委而示之次第相由大略已顯至下別釋隨更明之第一教興中標云意者為屬於誰答觀前二意似屬於佛據下諸門則有相妨今須一概並為祖意以毘尼教旨昔世未聞縱有所明猶非盡理十門意趣出自今師故以序字屬於能序教興二字即為所序意之一字通指此門又文標十意謂裁度之懷前云十門謂由之而入後言十條謂義類不同並對下諸篇隨名不定通明中初科顯意分二初約義通敘雖文在初科而無虛之語通含後二論下引文正示釋迦如來道成積劫德超三聖化於人道示相同之是以且就人中美為尊極故曰至人又佛身充滿隨物現形示生唱滅拯接群品今此且據娑婆所見誕育王宮厭世修行降魔成佛故云興世言有方者方謂方法即明如來權巧之智窮盡眾生差別心行故所立教咸適機宜皆令成益故曰無虛論即十住婆沙彼云修多羅依十力等流說一是處非處力二業力三定力四根力五欲力六性力七至處道力八宿命力九天眼力十漏盡力等流等謂無偏流即無擇毘尼依大慈等流說阿毘曇依無畏等流說謂四無畏一切智無所畏漏盡無所畏說障道無所畏說盡苦道無所畏據佛施教通有三心約法對機不無偏勝是故說法開解偏在智力破邪竪論特須無畏立制檢過唯是大慈所以然者如來興慈出現于世欲說妙法普令開悟眾生頑鈍遂說三乘有遇法音即登道果故以略教束其過非人根轉劣破略起非復開廣教指過立制猶不能遵以至三千八萬無量律議正法之時尚多毀犯況當像末焉可勝言如是次第曲就下凡不遺微物自非大慈豈至於此故戒疏云依大慈門曲授祕方偏賜內眾等引證中即本律增一中文彼云佛在跋闍國池水邊告諸比丘汝謂我以何心為汝說法耶鈔引答詞略眾生二字對外道中初文言外道者不受佛化別行邪法多論販賣戒云根本六師教十五弟子各各受行異見六師各別有法與弟子不同師弟通有九十六如是相傳常有不絕僧祇總有九十六種出家人則佛道為一外道九十五未詳合數兩出不同雖各立法而非正道與無不異以無法故空然獨居故云自也人尊者位過人天故道高者俱能出離故制斯戒者戒是聖法制令受行受之則聖財內備行之則美德外彰出過外俗所以尊高為對二字正是佛心制戒之言唯在金口昔來科為結集教興故此一句極多虛諍引證中二初通指制戒證觀下律者即諸犍度據前戒本諸俗譏言無有正法外道無異佛因制戒頗符此意然是他譏佛意未顯故指下文制法以明如說戒犍度因諸外道八日十四十五三時集會瓶沙王見已白佛因制半月說戒安居犍度因六群春夏冬三時遊行居士譏言諸外道尚三月安居此諸釋子一切時遊行因制安居自恣犍度因諸比丘結安居已作制不共語問訊佛言汝曹癡人同於外道共受瘂法衣犍度中有比丘持木鉢佛言不應持如是鉢此是外道法乃至比丘畜繡手衣著草衣樹皮衣葉衣瓔珞衣皮衣鳥毛衣人髮衣馬尾牛尾衣露身佛一一皆言不應爾此是外道法乃至結云如是一切外道法不應作且引一二以息世疑下諸犍度其文非一故云凡所及並懷也舊記指下結集中譏謗之文則凡所竝懷之語如何釋耶懷即佛意異術即外道術音述道也故下別引結集證此即本律五百結集緣起之文以佛滅後外道譏言沙門瞿曇法律若煙耳世尊在日皆共學戒而今滅後無學戒者於是迦葉遂興結集即告眾曰我等可共論法毘尼勿令外道以致餘言祖師取意加上一句使文易見問今明佛意那引結集文耶答當科所明竝引佛世文既非一不可別舉故通指之然結集之文語意彰顯故得更引展轉為證問結集時事既在滅後那證聖心答結集存法既為絕於餘言佛意本興信專懷於異道如下五例開制往徵亦引後文用彰元意此為明例何事疑乎此約迦葉結集意釋又佛始歸真便譏法滅反知在日對彼何疑此取外道譏謗意釋古記錯解故持委示對異宗中初科上句明佛意毘尼之教因茲而制故云來也即義鈔云如來始於鹿苑終至鶴林隨根制戒乃有萬差良由眾生根器不同樂聞有異故令聖制輕重不等緩急有珠諸部輕重乃有無量雖復不同各稱根性皆有奉行之益以是義故聖制本有五名又引付法藏傳佛現在世分為五部等大集夢意亦同此㲲若爾義鈔下文復云無五意者答此明佛在不分之意謂隨機立制豈有五意故使現在但有五名不分五別不妨輕重緣急即是懸被將來故彼云聖者之制現無五意但有懸記之言佛去世後始有諸部分張等次句彰異言多別者統論分部初則二初剏初各集次一百年後上座部中分出五部又云二百年後分十二部四百年後分十八部通根本為二十乃至復分五百部備如義鈔此不煩引相傳云本作宗則有其十八後修時改為多別故知此語通含非唯五部引證中既云多別不可備陳略引二部以明異相故云且如等所以特引此二部者此方盛弘假實二解敵對相反於義易見或可部計雖多不出空有是以下明戒體亦出兩宗耳兩部勝劣略列四種今合釋之初戒本繁略對下立教顯約十誦著三衣有六戒一太高二太下三象鼻四多羅葉五參差六攝縐內衣同上共十二戒則為繁也大小便利止有一戒敬塔都無此為略也四分敬塔便唾各隨別相具列多戒故云顯也著衣立二義無不收故名約也或可二部廣律戒本對辨優劣學者尋之二指體未圓對下軌用多方十誦色為戒體能造所造二俱是色俱不談心未窮業本故未圓也四分二非為體體從心發然限在小宗曲從權意別立異名退非是小進不成大密使行人心希實道多方之義其在茲焉故業疏云由此宗中分通大乘業依心起故勝前計等問此句既明戒體何以但云軌用多方答此宗法相不唯談體如羯磨疏五義分通故茲一句通含多意復彰今體望前雖勝對大猶偏但云多方足彰部意故戒疏云斯人博考三機殷鑒兩典包括權實統收名理等若爾前宗何以直示答彼部所立正合小宗定為偏計更無他意故直顯體義兼隨行亦非圓故三接俗楷定對下提誘生善多宗五戒必須盡形八戒唯止一日一夜此時定也二戒不開分受縱有分受得善無戒此數定也四分二戒長短並通全分皆得接俗之教但存住善故非楷定四御法無準對下人法有序彼宗人位雖同不無差異如無和尚得成受戒及界內一人四處足數一界之內多處作法互相受欲此人無準也三種羯磨加則彌善減則不成即法無準也文中似單明法然御之一字即能秉人對下須知二皆無序四分僧有四位四人除三法白志受滅悔殘五人除二法中受悔殘十人除一法梅殘二十人通作一切又須精簡足數別眾即人有序也法有八位心念有三但對眾也對首有二但及眾也眾法有三單白白二白四眾別羯磨各攝分齊互不相通少有增減判歸非法此法有序也上明兩宗不同之相皆是如來隨機施教淺深不等懸鑒未來部計支分作輕重說教興之意於茲明矣古師科此為分部教興者遠矣次當宗中初文上句指前下句標後言通明者以前三意統毘尼藏義該群部不局一宗然上三意能所互彰初就能施必兼所被以慈不虛發專為劣機後之二種文約所為用顯能施次則彰正法之尊高後乃明教門之差別正明中初科上二句明教起由機人既下四句明機別教廣攝誘謂曲施方便弘濟謂普令護益軌用即一切事法止作兩行上句明能說之意下句顯所說之教貴下六句敘今從要本詮謂教之大旨對下條緒即事之別相所以等者探後二例示本詮相開制即第二持犯即第一或可此二通該五例以一一例中竝具兼故驗諒二字謂以智窮考旨意二字即立教本懷諒信也今下總標一部之文不過五例以少明多故云束也初遮性者毘尼所制無出遮性用此二門求一律藏總歸二意故曰往分初通局中十不善道違理之業體本是惡三藏齊禁然毘尼中但制七支更增篇聚故通二教壞生掘地等本非不善息世譏疑制方成過故局制教據文合云遮戒則局於制教文中為示遮性之義故云因過等然性戒元有無論大聖制與不制無非結業感報三途遮戒不爾佛出方制故經論中或名主客或號新舊或約違理違事分之餘如戒疏次科性戒中初句正標教意謂下釋成初二句示文緩此收一切性戒故云並有文雖下釋義急初明教急行難如下略舉兩戒顯上教急既下二句釋上行難故知下結歸三時者謂初入入已出時於三時中微動樂念還即成重毀呰即九十中罵戒慈心誨勗雖罵無犯微生瞋怒亦結正科故曰開實結犯等二戒開文竝見戒本遮戒中初明緩急制即是急開即是緩對前性戒義立四句一文緩義急性中開也二文急義緩遮中制也以非性業隨緣開故三俱急者性中制也四俱緩者遮中開也豈非下正示興意上明護俗大慈下明制道道既無失俗則生善一制兩得權巧在茲涅槃所謂息世譏嫌即其義也枉坑者枉謂邪曲以於僧起謗必墮邪道永無有出喻之若坑或可約報即喻苦趣引證中彼論第七明犯罪有三種一初犯緣二因犯故制三重制於重制中又有二種因緣一者急二者緩急謂乃至共畜生與人同犯緩即聽捨道還家行婬後若樂道還聽出家受具此明性戒又云世人嫌言云何比丘無慈心斷樹生命佛因制戒是急為護住處開斷草木是緩此明遮戒二儀儀謂法式令尋之者出論家意謂前且引二戒顯相意令準此例尋諸戒無不皆然故云通望用此證前遮性二戒急緩之義通該一切矣次開制中唯據遮戒與前為異標云徵者訓求訓驗二義皆通引示中初科言下文者即五百結集文彼明迦葉結集已長老富那羅重更詰問結集次第迦葉一一答已彼云我盡忍可唯除八事親從佛聞憶持不忘佛聽內宿內煮等迦葉答言實如汝所說世尊以穀貴故聽時世還豐佛仍制斷彼復言佛是一切知見不應制已還開開已復制意云開制無定則非一切知見鈔引迦葉答辭仍易知見為智人耳此明時有豐儉不可一定故興此教被及後世即了論中時毘尼也在世教中五分文出第二十二卷上明聽違佛制彼疏釋云如手摶食此方不為善又如袒膊跣足之類雖非下明聽從他制如用匙筯及鞋履偏袖及依王制等問消文可爾興意如何答時數遷流豐儉不定方隅隔越風土不同立法檢非難為一概意使隨時適變逐處所宜故立未來竪通像末仍施現在橫被邊夷旨在為人義見于此問時方名相未知何出答明了論有時處毘尼彼云邊地受五得數浴洗中國不聽此名處也昔用三歸今時不得熱時數洗寒時不得此即時也故知時方不唯一事問既曰當宗以辨那引五分而明在世耶答本律明開邊方五事但文局事定未顯通收故假彼文以申當部耳今世愚僧不知教相破戒作惡習俗成風見持戒者事與我違便責不善隨方呵為顯異邪多正寡孰可言之法滅世衰由來漸矣又東南禪講半夜噉粥過午方齋木鉢紗衣不殊外俗循名昧實竝謂隨方不學愚癡一至於此慎之互融中二教即二世教此有二釋前教本為未來即兼佛世後教本興現在仍通像末或可恐疑引用五分故此釋之彼此兩字即指二宗謂四分制已更開即兼在世五分雖制不用亦兼未來既而彼此相兼即知本宗自具二世但文不顯故用彼文問遮性中亦明開制與此何別答前通遮性此唯在遮若是性戒不論時處故了論中一切時處毘尼謂婬盜等是也第三例中酬因曰報言強弱者或約男女二位對下就制也又男女中各分三根對下約行也所以不言重輕而言聽者以重輕之言不該約行故以重聽通收二種就制即止持約行即作持初中準戒疏深防限分各有通別制四重防三毒即根本防制種類防四重名深防此即通也又云過犯未窮預加重約禁微防著故曰深防如尼觸犯夷等類等餘三重約戒以論即名別也若飲虫水防殺畜手搏防打亦號深防非此中意以不對報故言限分者指重緣心以為下凡限分之制此即名通通諸戒故又云若就相論可有修學竝是限分如漏失僧殘尼墮此為別也又如僧中輒教尼等及尼中四獨紡績一切不同之戒是也令此約報強弱須從別論古記反破此解請以戒疏為準約行者山謂蘭若即上根也世謂聚落即中下根也然上士不獨居山中下豈唯在聚取其大約以處分機初明山者僧尼二眾通行四依一糞衣二乞食三樹下坐四腐爛藥此上根也尼樹下坐但非蘭若二明世者衣中根報次者制三衣又次者畜百一又次者畜長又次者被褥等重物又次者聽眾寶莊嚴此非常教唯天須菩提耳上準戒疏明五開彼云良由眾生根報不同強弱不等致令大聖方便開遮此五前強後弱中間互通食中開受僧別二請僧常檀越送等處開二房藥開三種此四開中下幾問制行二位強弱何分答制則強輕而弱重強依限分弱假深防行則強制而弱聽強者堪耐弱必隨開四中初句明機差此謂佛世起教之機非五部師也次句示教別即對諸部以明輕重輕重言通不出罪事如初篇重犯婬制毛頭盜限滿五羯磨楷定受法簡人之類即此重餘輕又開結淨地捨財還主接俗生善之類又諸部境想不同五分不開疑想僧祇性惡無疑想十誦前有方便除疑想今鈔準用四分除破僧婬酒不開疑想餘戒通開上竝此輕他重下二句證成異執即是各計非貶斥也問此就當宗以辨興意那以五部為證耶答此舉群宗為顯四分五中初句通標事謂止持門一切諸戒如婬盜等法即作持門一切制法如結說安恣衣藥受淨及餘一切眾別羯磨法下別釋初二句明制法意上列諸法通制一化行必有方違則獲罪如諸羯磨竝託緣成必須四準評量七非撿校故曰法唯等事下四句出制事意情謂有情性即三性性因情起故云情性然以情變不常隨緣無量故令聖制教等塵沙事託境生故云隨境有犯不犯故云得失或託下釋上隨制三性犯戒廣如中卷篇聚名報及戒疏中今依疏文略引示之彼云託善緣以興教者如坐禪讀誦講導開悟必以正命居懷制伏煩惱此名善法方希名利邪命自居相雖是善反成貪毒壞心障道勿過於此是故大聖興教防之此通遮性性如慈心斷命好心互用三寶等遮如乞衣過受勸增等類言不善緣以興教者如十惡等體是不善能廣三途增惱障道故聖因過制教防之此局性惡言託無記以興教者如草土等體雖無記數作不已外彰譏醜內增心亂教制防約作者犯墮餘廣如後此唯遮戒言世譏者即諸戒緣多因俗譏起過方制一往以分則上句通遮性下句唯局遮然性戒緣起亦兼世譏故此二句不可偏判思之可知古多錯解故為曲示如上五例三四約機為顯於教餘三就教非不對機又前二局就止持後三通於止作總意中初文為二上二句結前總下示意大毘尼藏興意極多五例統收大要略盡望其別條實為未備故云且略等薄知言可取解方詣明有所歸方謂方所詣即至詣統一律之始終故云總撮指一意以該攝故云包舉拯拔也凡庸者若據所化實通諸趣若取可度別在人中三歸五戒餘道俱霑具足律儀唯人可受必約通別兩意釋之然此所明乃是如來出世大意語該三藏義涉五乘且就所宗故為律意耳泥曰或云泥洹涅槃等西音之轉小遠疏中翻之為滅智論涅名為出槃名為趣言永出諸趣疏就所證之理論約能證之智古記至此廣列義章今意不存如前已示然須略舉以遣文相諸小乘論通明二種涅槃謂二乘之人見思永盡真空極證報質未亡故名有餘依也及乎化火焚身身智俱滅同太虛空故名無餘依也若約大教即指常住不生滅性為大涅槃今文須通泥曰兩釋若就權宗即指前云若取開會須歸後一扶律談常即其意也下文調三毒求四果等竝同此釋引證中兩段並本律增三中文初段三句上二句即孔雀冠婆羅門問阿難之語下一句即阿難答詞彼其云為調貪欲瞋恚愚癡令盡故增戒學者出世正道增上勝法非謂漸制而言增也定慧亦同云何下二句即引後段上句即佛問諸比丘語為字平乎下句是比丘答詞彼具云云何增戒增心增慧學學此三學得須陀洹乃至阿羅漢等文中束之所引二文辭理無異但上約所斷下據所證耳問戒止業非那云調毒及求果耶答如戒疏說尋之可解古記於此廣談斷證紊亂學宗戒疏委斥如前具引又云今所學者正為求此四果以斯宗正屬聲聞乘故談至此以為極矣昔嘗聽習每臨此語不勝痛咽可謂屈抑祖乘聾瞽來學受戒篇明上品發心沙彌篇說出家學本篇聚所引勝鬘智論竝以毘尼即摩訶衍羯磨疏中圓教出體即同三聚終歸大乘域心於處何得不思致虧發足如是等文云何銷釋致使一家教門宗骨俱喪後賢有識深須鏡諸結指中上三句指下篇別事下二句示此中總意下諸門者即三十篇所以不言篇者以一一篇中隨諸別事各有制意今此遍指篇中別科故云諸門耳下總結云此之十條竝總束諸門豈非指下諸篇耶有云後九門者非也尋條知本者條即前事是別相故本謂今文示總義故餘九同此里文略耳第二門初標舉者教興大意如上已明然其罪事重輕不同欲本大聖裁量之意故次明之正明中初科前二句標難上句指佛心下句即祖意何下釋難裁所以初徵原下釋上二句約人推教則教密難裁又下就教推機而機差叵究原亦推也窮即極也眾生性欲唯佛窮盡隨宜授道毫釐不差既出聖謀故非凡測若取偶對上句對下合云識病之人下句對上合云受法之器法喻互舉語簡義彰所以下雙結扣音口亦去呼擊也方謂方所如來立法量同空界群生萬類無不沾益故其所利不在一隅故曰無方既其無方則非思議所能及故云豈可等次科雖然者與奪未決之語對前乍覽故云重覈前約當機故難裁斷今取被後故言自顯遠標即律教教以指道喻之如標超諸世典命之云遠裔謂衣裾取其末下以比後學在文者即下七例並見律中凡論教義或無明文須引證據律文既顯故不假證示現總相故云大略別列中初例準業疏中明受捨漸頓先五次十後具名漸徑受具足三戒俱得名頓捨具戒作沙彌捨具十作優婆塞名漸直作白衣名頓此古記解未見制教輕重意今約持犯篇中不學無知漸頓釋之戒疏云行違本受厭而不學故名止犯不學具漸頓起心有通局無知唯局漸緣境不了犯不學罪漸中隨境結故輕頓則一切犯故重不學出受戒說相無知出不攝耳戒二結正業科即篇聚之罪各從種類並約七支業理輕重以分上下如篇聚云正結罪科止樹六法是也三報果不同者此明人類報有差別謂男女黃門二形之類四夷俱重摩觸麁語媒嫁等則有輕降如律廣解具列其相可尋注戒舊約僧尼別制釋或引母論犯報四句釋於義似疎四攝趣優劣者律明趣有三種人及非畜非人一種通含四趣天修鬼獄又非畜中各有男女黃形並如戒本所列人趣為優畜則為劣非人通優劣且約四重以示其相初人趣四戒俱重二非人婬重餘蘭畜生婬重盜吉殺有智蘭無智提餘篇自尋五起情虛實者此有多釋一如謗妄等戒情虛故重情實皆開諸戒不犯文中並標實爾無心等是也又諸戒境想初句情虛故重疑想情實俱輕除婬酒戒又諸戒中或標知故字者即顯情虛如故斷畜命知水有虫等非故不知即是情實即如本律犯必問心無心不犯制教重輕尋之可見六開制互立者一切諸戒若止若作有制未始不開有開未嘗不制二教相待義無獨立且如婬戒乃至畜生毛頭即犯仍開怨逼此即制中開也雖許境合三時無樂開中制也又如本制三衣次開百一復制加持後開畜長仍制說淨時緣不暇復開十日不說則犯又如本制安居緣開受日復制限內須還又開難緣不返等但制即是重開並為輕如是類求方體教意七中喧即聚落中下兩根靜即蘭若頭陀上行四依教重四開教輕此明如來制教重輕又云在文自顯須就本律詳而求之故今所釋頗與昔異結示中上句屬佛下句屬鈔主據本制懷臨事處斷則輕重合教萬無一失料簡七種初受隨簡一是背於受體餘六制於隨行二就行中上作簡二三四五是止第七是作六通止作三就止中能所簡第二是所犯罪三四即所對境五即能犯心如是知之第三標中言對事者一約判罪二據行法三謂亡物二衣篇云隨本受體何律受戒即以此律而定輕重應須問曰教門輕重聖意可知然現翻四律互有乖違重輕不定今之學者依何為準此門所立其意在茲敘古中初科佛滅千年至後漢明帝時騰蘭初至人雖剃染未有歸戒跨及曹魏將二百年曇摩柯羅或作迦羅此云法時依四分羯磨立十人受戒為始出僧祇戒本令眾誦習第一差也至姚秦時十誦廣律初翻人即依用此二差也其次四分僧祇五分三部廣文並傳此地人謂僧祇與先戒本文理相合乃捨十誦多演僧祇此三義也唯四分五分曾未弘通至于元魏法聰律師方悟前非於即罷講僧祇首傳四分然以人情執舊多未伏從及乎隋朝智首律師作五部區分鈔往往未能盡理尚有紛紜故今鈔中特須提示歷年既久執諍仍繁不能備陳故但通斥云諸師等東流者標其所至或云西來言其所從幾字平呼近也自漢至唐撰鈔之時凡五百五十九年故云近耳若取曹魏得戒已來近四百年穿鑿者學無師稟肆意攻求不從正理故以比焉孟子云所惡於智者其為鑿也注云悉人用智而妄穿鑿推所由中上句明迷教下句示迷行宗旨謂假實不同本趣即色非色別勸學中初句勸久學學師謂稟學於師次句勸憑正教何下明離過二句語別義同但上約破斥下取輕誚淪猶墮也嗤即是笑正判中初文上二句即曉其本趣體下謂識其宗旨業疏云如戒一受願行須同焉有受依假宗隨行實教神州一統約受並誦四分之文及論隨行皆依有部行學非唯體相乖各亦乃緩急隨情等有將體既等語為總師語非也更示中據上所明於理已顯所以重示者一恐疑云俱是聖教縱令互判亦有何過二又恐云四分可爾餘宗不然故復釋之初文上二句標謂下釋如已學四分即依四分判彼十誦受戒之者餘互亦爾同則不言乖則有過故云脫罹等脫忽也罹遭也愆即是罪上句明判斷之失下句示違犯之罪愚癡即無知也次科上二句正示諸宗判處並同此列故云通立等格式也較音覺正也後二句結告條領即今所立纔覽此門疑滯即遣如氷之泮故云釋然大觀謂所見通遠也第四門上明考體專用一宗然或被事不周須通他部故此明之欲曉此門文相大意須以三問前以激之問受體既從四分秖合專依本宗何以今鈔備引諸部約體明隨其義安在問三藏所詮事理兩異既宗律藏何以下引阿含等經及餘小論豈非化制不分耶問律是小乘教限須別安得輒用華嚴涅槃地持智論豈非大小濫耶若不明示學者俱疑故此決之尋文可見問今鈔通用三藏何以但標諸部答諸律體相既殊須明引用分齊是故此門正明諸律至後六師方通經論有云諸部通收經論非也敘分宗中初文言統明者總括諸部也如來滅後迦葉結集為八十誦律五師相繼一百來年並無支派後因諍計遂分五宗流既出於一源枝必歸於一本故云實一文也但下示分所以上句明如來赴機設教不等有以機悟屬五師者非也下句明諸師各執不同岳立喻其所執如山之固注戒序云雲飛二部五部之殊山張十八五百之異有謂五岳對五部非也況諸計之言不唯五部請以注戒質之次料上二句敘分宗義鈔云毱多受法既少不能均融故分五部然既大聖懸記蓋是時機所宜執諍雖殊無非證道即大集云五部雖異不妨諸佛法界涅槃是也下二句明各集競謂爭馳言大眾者此濫窟外部高僧傳論云上座大眾創分結集之場彼言大眾乃是窟外此云大眾定是窟內即今摩訶僧祇此翻大眾以五百人亦大眾故智論則云千人是則大眾名通二部上座唯局窟內學者須細辨之一家者且據五部各自為言三中初輕重異者一約罪釋本宗初篇重犯餘部但吉本宗犯罪方便隨滅餘律仍存四分女觸比丘蘭十誦結殘十誦身根互壞觸者蘭四分捉髮亦殘且略遣文餘尋釋相二約亡物釋下云然此亡物諸部未融等錫杖澡罐針錐等物四分歸重餘律並輕如二衣中三約事釋如四分受戒緣具方成故重餘宗緣闕並開如無和尚無衣鉢等本宗轉欲則輕餘宗不開故重本宗悔殘微乖法式悔罪不出故重十誦不行別住六夜直得出罪故輕二持犯分途者即如上引境想不同又四分婬戒並據毛頭十誦論犯過皮過齒四分隨處盜五成犯十誦取本古錢方結僧祇通夜護衣四分限在明相三有無遞出者遞亦互也即如上引眾學有無及盜非畜物四分無文並準十誦四分二寶蠶綿並無悔法十誦出之又四分衣界通有勢分餘部皆無等四廢興互顯者四分歌聲說戒用廢五分直說取興四分開結淨地用廢十誦制斷取興又如僧祇牒事說欲用廢四分不牒取興之類次明取用初科標示中立四分為本者順本受體離前互判過也須用諸部老行事有據離後執隅過也引論中欲明取舍有所準故此論五百羅漢造釋四分律初牒釋婬戒緣起已將入戒本即變為宗論其中一羅漢曰於戒句中即下隨本於戒本中即下本也於問難中即法師語若欲知者有四毘尼諸大德等如鈔所引然諸羅漢並具神通不無勝劣故選召能者耳抄出者傳于貝葉也上是告眾之詞一本下出四法之相初本中云一切律藏即指當部諸戒非謂通諸律也二隨本下略其釋文論云四大處名為隨本論文難解諸釋不同且依古記約通別二緣注之佛告諸比丘我說不淨性惡遮惡俱是不善故不清淨而不制癡狂心亂並通開故然此隨入不淨一念心憶是比丘便入犯位於淨不入是名不淨不順開教故淨不入即是犯罪故名不淨第二佛告諸比丘我說不淨如上而不制如上然此隨入淨是名淨心不憶知順開入淨由不成犯故得名淨第三佛告諸比丘我說聽淨如婬怨逼儉開八事然此隨入不淨三時有樂時豊不止二並歸犯於淨不入於汝輩不淨乘於開教故淨不入並結正犯故言不淨第四佛告諸比丘我說聽淨如上然此隨入淨於汝輩淨順於開教並無犯故一切諸戒並具通別二緣通如持犯別在隨相今此四句前二通緣後二別緣又前後二句中並初句是犯後句不犯一一戒下皆有二緣故名隨本是一切戒大要之處名四大處三法師語先說本者即上二本廣分別者即論中解釋之文一一並云法師曰是也即論主一句祖師助顯非本論文四意用論作自意彼云何謂自意答置本置隨本置法師語如評一戒則涉三法且置此三待加意度及對三藏方可取舍以意度籌量可否用方便度詳其理趣及三藏者上是意詳下以教勘彼云以修多羅廣說以阿毘曇廣說以毘尼廣說以法師語文略下句故云等也此謂三藏中法師語也先觀下正示意用次第之法根本即本句義即隨本文句等不等者謂以上三對考三藏等即同也注中指廣今略引之彼云律師者有三法然後成就一於本諷誦通利句義辨習文字不忘二於律中堅持不雜三從師次第受持不令忘失在文難曉故詳引之廣更如彼正下一句結示取意中初文行藏者約行事之廢立取捨者謂考古之是非實難非易文之互耳大詮亦即總意前云遠詮本全並同程示也下列科條取捨有據故云無惑舉例中初明本圓不取示有所宗如重輕篇聚眾法羯磨受懺治擯結說安恣等用人用法多出本宗又下標云部別不同不取外部皆此意也餘下二列示四例初不了有二一不明了如十五種略說戒及東方有山稱山之類二不了足如四人法不除懺捨等下文一一別標用此二意尋之可見二廢前者如歌聲說戒鈔云此是五分廢教如試外道魚肉正食雖同廢教至下六師方可言之此中且據諸律古記一混學者須知三有義無文者如顛狂人前捨戒不成是有不足之義故引十誦等證之如定由旬準律十四說戒十三先往準強百里遂用智論下品為定又十三難不問壞比丘準尼受反問引善生明文此皆屬後六師中四無文有事如云三衣應受持及非時殘宿不受皆明三藥加法而無受文或云結界集僧無自然六相文等如下結示取用法相關中初文為二初正明取舍緩急重輕四義條別初如受衣文僧祇通夜多論無衣鉢得戒等並緩別也二如僧祇轉欲即失捨財入僧永棄等名急別也三如前所引境想不同即重別也四初篇無重犯等謂輕別也是非一句通收上四互望為言又引事釋者足數中古師以破戒和尚在十人外今斥云不得輒用他部又受日中云不得秉四分羯磨用僧祇事訖等餘尋諸部篇準論不取者即同意用也故下二引證言四說者本律增四中云佛告諸比丘有四種廣說一若比丘作是語長老我於某村某城親從佛聞受持不忘此見法是毘足是佛所教若聞彼說不應嫌疑亦不應呵應審定文句已尋究法律若相違者應語彼言汝所說者非佛所說或是長老不審佛語不須復誦亦莫教餘人今應棄捨若與法相應者應語彼言是佛所說應善誦習教諸比丘等此名一廣說也第二從僧中上座前聞第三從知法眾多比丘所聞第四從知法一比丘所聞並如上檢校文同不引十誦墨印者即是四分四說故云亦同但名異耳四分約能說人十誦據能證教彼云若言我從佛聞乃至一比丘聞未應歎毀應向三藏聖教印定是也引此二文者由先世諸師隨情引用今約部類檢勘可否即同意用若作此釋方見所引四說墨印頗符論意次科初句躡前次二句明合教心謂行心境即前事心不昧教事非暗託故云相照規猷謂法則即前四法四說四印也方二句明合理相關方引既無橫評之繁條別不取仍無闕事之略前文所謂圖度取中至此方彰故非晦沒晦暗也沒隱也三中初二句標其偏執即同下文初師見也隅即是角涉下示其過失上句即行事闕下句謂檢教闕遂下明自三乖諍如手持衣藥之類互下出乖諍之由用他事者上科所引既號相關乃是彼此相通之事必若本律限齊分明止可全取彼部故云還用等如僧中有緣自說欲行僧祇事四分止有受轉說文即有限故通結淨地行五分事四分止有別結不應量衣說淨行多宗事四分但明應量十三難中犍黃門得受鈔云必須勘取依餘部為受四分自截滅擯別眾食開緣後二四分有七士多論僧次五分衣時自然衣界後四本宗十一洲并水道並出他部略示一二餘尋鈔中舊記反作不得全依以釋請用上諸事質之兩存中四分楊枝不受僧祇咽汁須受又如教授師壇外受衣五分或在眾中戒師受者僧祇多論須請淨主五分但令漫標僧祇淨主三由旬內多論若死若入異國更須別求下並云隨意用又善見三衣穿破失法多論緣斷等餘自尋之檢閱中傳聞者或章疏所出或口相傳授容有舛誤不可輒憑故皆親檢使後無疑次用六師列見中初標問所以此門之後明六師者答此有多意一彰引用三藏並有準據二顯諸計通局未融三示今意總通六見四明此鈔所宗有歸問所以唯標六者答前伐已來弘唱雖多取其建立不出六見故標六種攝無不用師資相傳至唐不絕故云世中也列示中問第二與第三阿異答第二師但見缺文直取外部第三不爾先求本部之義後引他文意顯事出己宗不乖本趣今鈔所取意亦同之問第四師意復有何別答前雖取他不敢廢本此師不黨以理為長五藏者四阿含外加一雜藏長增中雜是為四含雜藏者分別功德經云非人弟子諸天所說或說宿世因緣三無數劫菩薩所生文義非一故名雜藏阿含此翻法歸謂眾法所歸也五辛者葷菜也葷謂臭氣一葱二薤三韭四蒜五興渠除初師外下五注釋並見諸篇第二師文見衣藥兩篇第三見足數第四見說戒四藥第五見沙彌第六酒肉五辛見四藥八不淨見釋相並如後引通結中上句總牒次二句是縱下二句即奪謂在教皆正因人有殊言通局者初約大小前五局小第六通大小二約三藏前四局律後言通經論三就前四本異分別第一局本宗後三通異部四就後三取捨分別第二第三取他成本故局第四捨本從他故通五就二三融隔分別第二缺文直取則部類相隔故局第三有義方求則彼此相融故通若約相兼明通局者初不兼後故局後得兼前故通中間兩望則含通局顯今中第三在律為當識宗旨故第六於三藏為當知所歸故上明正宗二師餘下示參取餘四如結淨地取第一師業疏云如鈔序中小持律也持衣加藥直言說戒廢試外道下並用之然於餘事有不取者故云參耳得失謂考其可否隨機謂摘其時要知時即祖師自謂一取一捨皆合宜故聞第六既是所宗何以今鈔不廢淨地若爾合歸參取豈是正存耶思之第五標舉中文義決通言通能所所則有三一文義俱闕二文具義闕三義具文闕能則有二一文二義義復分三兼理及例別開成四捨別從總但云文義然此一門從能為目因前三闕學者疑壅故以此二疏決令通敘立教中初句示理體言理有二小乘有部唯說生空四分假宗則兼法空並名權理大教則指常住真性名為實理當分過限二意通之然斯二理體唯真寂名字莫詮言說叵及故云絕名次句明立教名即是教標示也美於理體故云宗極宗則萬化之同歸極謂諸法之源底通論名教咸詮真理羯磨序云大教膺期指歸為顯一理故使高超輪梵之典逈殊儒道之書人天獨尊良由於此上明依理以立於教下明教興必從於事事即世諦隨世假名立教詮理所謂如來說法常依二諦是也斯文之言通含一化所以下文別指律藏問律文詮事應非顯理經論詮理應非隨事答統明佛教託緣而興無非對事皆為顯理但藥病相對不無親疎故分三學對治有異耳別明中初科初二句敘教本具周斯律藏者且據所弘四分一部言即能詮事謂所詮但下正明遺缺有四意初示正意上二句明法聖時遙次二句顯法隨時變此約四分結集之時即當佛滅一百年後故云渺邈即遙遠也聲謂言音彩謂好相靡追猶言莫及也五師相付百年已來如來在日親宣之事莫能反追教逐時訛故有遺缺如優波毱多問尼佛在日事及令魔現佛斯可證也加以下三種並是兼意故例標重增之語捃居運反採掇也前云隨其樂欲成立己宗故不樂者則捨而不存故有缺矣上二並是西土結集之差下二即明此方翻傳之失業疏云覺明論主誦本東傳至於翻時隨出便寫貴在一本無暇覆疎尋復返西此土行用故多缺耳又結淨地四句成白疏云此是結集缺文同上二意或是覺明漏誦又可竺念遺筆同後二意此中欲顯決通先明殘闕殘闕之由不必一致故以此四詳而求之然亦不須舉事強配顯今中初文紛慮謂心想之亂總會者以三種條例收一部遺缺後學披覽不滯一端故云通大見也別示中初至前事即第一俱闕例前史有者一例二理例中如律無解戒場法例三小界翻結成解諾律無受七日法例半月眾法白文立之又無請二師文例準請和尚法此據作法釋也又如破白讀羯磨舉誦戒為例忘不持衣往會不及以長衣開忘為例牒多緣受日以懺殘多罪同法為例惡心解界不成疑界不得重結並以淨地為例三種安居以三品鉢為例上是本宗下引也部明相會夏以僧祇護衣為例安居依閏以多論受雨衣為例此約行事釋也餘更尋之理決中言理有者此謂無例道理合然如此界僧為別處三寶病緣及僧次請皆開受日又當日出界遇難義判得夏又十六遮中負債人準理得戒此等並無文義及例故云理也又說恣中前後梵唄偈詞唱告上座誡勅不出教文者及受戒中開示境心威儀安慰正羯磨時白告警策等亦名理有而成前事也二文義具闕如律盜四方僧物犯蘭決云此約暫礙僧用故輕理須犯重又云至二三人所共作法成賊住難決云此約眾法對首為言又得受布薩錢決云準須付他四分夏中和諍開直去不須受日決云約緣而受不傷大理等如是尋之論言者古記云即是善見尋文未獲此所謂不以文害意也三義具文闕如有難移夏準摩夷不破安居遇緣出界忘不受日引五百問憶即悔者得又四分不明重受日法引五百明了二文決之據義雖當恐謂師心故云息謗也問如上所引非無相濫更請分之答無文引事相比名為例決又復無例號為理決以意定文曰義決通引文成事曰文決通問義之與理如何分別答通而為言理義不別下義決云以理為正別而為語非不如上問上則單配有相兼否答理決一種定無相兼餘三相兼略舉一二初明例得兼理不兼文義以無文義方成例故如依閏安居以雨衣為例仍云夏是制教理宜通護二義決中三句自有義決兼於例者如四分邊罪等二十二人今師定自言不足數義云體既非僧若僧同知故不足數必不知者成足又引不持戒和尚四句為例等自有義決亦兼文者如四分盜畜犯重決云此望鼠心未定從人判罪仍引十誦多論等文盜畜物犯吉復有兼文例二種者如律令夏竟解界決云此為諸界同受德衣仍云文如十誦又引安居未竟自恣不破夏為例三文決通中亦三句自有文兼例者如移夏不破引摩夷文又引十誦僧祇二處受衣為例亦有文兼義者四分但云尼開受七日引僧祇云尼無羯磨受法仍云所以然者以尼入俗生善義少故又如引五分一一說欲又加義評等自有兼義例者如自然界無異界定圓有則不定此即義決仍引了論三由旬界合角量取為例又引十誦善見等文問今言決通為決本宗為他部耶答昔人不曉並云決通四分今意不然但由時事或昔所未行或諸家異見學者疑壅故有決通若爾何以前文敘律闕耶答秖由律闕故令事暗更為明之一自有本文還決本律如受欲中釋餘處行即以自恣中出界外決之又此律宿欲不被所為事還以四分明相欲出開略說戒決之又如合河結界還以尼律界中渡河決之如前所引惡心解界引淨地等皆本律事耳二自有本律一文即自決通如三小界不立相還以三小羯磨決之又如淨地不得僧住文云除去比丘又立淨地唱相律云應唱房名還即本文以決本事上二句屬義決通三自有他部還決他律如集僧中多論道行一俱盧即以十誦六百步決之又如僧祇七樹中間不明兩眾半分乃以多論比丘遊行有縱廣自然決之四自有本宗反決他部如十誦可分別聚落齊行來處乃以四分村界院相決之用此諸意遍尋一部無不通達問文義俱闕為局當部為通他部答通該三藏何止本異他部有文即落後句由無文故即無義也問義決通中為通為局答亦通他部十誦伽論尼無捨戒再受之義決云應得作下二眾又十誦令五眾受日五眾邊受決云準此當眾相共作之無者準前言告等古多錯解不覺太繁略亦非難但恐不解餘亦未盡學者更詳不能中初科上二句示難前四決中文有取捨義是意裁寡學淺知故非所及對彼古解故云廢立下云決判是非意亦同此自下二句揀非顯是律相言通開遮語別開遮二法在律尤難故別舉之不下二句顯過不然者反上非深明等累謂疑滯或可約罪二釋俱通他境即前事以不明教旨皆是妄施行不成持故云無益此約自行或可他境即指餘人弘演化他並非正教故無益也引證中引律第六十卷末佛在跋闍國池水邊教諸比丘修行聖道莫相鬪諍彼云於阿毘曇中種種諍語應語言諸長老所說文義相應不應共諍初句復作是言長老所說文異義同此是小事莫共鬪諍二句復作是言長者所說文同義異莫共鬪諍三句復作是言長老所說文義俱異莫共鬪諍四句下二句指律廣文彼云應作如是觀察若共鬪諍於沙門法作留難否復問是可呵否復問能進善根得沙門果否諸比丘皆一一答之此謂進也又云若作如是諍事滅者應語彼比丘言汝為我等滅此諍事彼比丘答我從世尊所聞如是法今為汝說若彼比丘聞已便捨諍事此名止也佛說如是諸比丘聞信樂受持今引此文以明佛世尚恐文義相諍特此訓之證上決通難為廢立則非虛矣示堪能中初句牒其能者必下示其博贍上二句明學通三藏下二句明解總六師吾祖律師即其人也聖人出現為物垂範謂之教跡雖言通三藏而別指律宗故云斯也引十誦律五十九卷初列示三事一即緣起二即戒本三即重結如初戒乃至共畜等應下勸籌量又為三初總列一部律文大為三節二部戒律即初僧尼戒本義解即隨戒下廣解之文故云及也毘尼總中問諸犍度增一即律後法數上明觀教二開下明判斷開遮輕重貫通一部且舉衣色略示相狀青黃赤白黑五方正色俗流所尚能發貪染故是不淨佛所制斷故云遮也非色即青泥棧三種染壞三聖同遵相超世表所以云淨是佛所教故云不遮三如是下結告通指一部始終故云本末引明了論彼云如諸佛立戒於一一戒中應了別五相一緣起處即國土也二緣起人即初犯人三立戒即戒本四分別所立戒若犯此罪不得共住五決判是非於三處犯不看他面者判斷公直不取顏情也略同上者會前十誦三事也初二兩相同上本起第三同上結戒隨結四五二種似同廣解由不全同故云略也下文指廣即如上引第六門標中前五並屬能詮教教必詮行一宗旨趣萬行元基理須明識故云教所詮意詮顯也王明中初文上敘文廣一部律文總六十卷故云浩博下指行要故云大趣以前僧尼戒本及後調部即止持行二十犍度已後等文即作持行文多明犯意在成持翻上二持即成兩犯宗部之要豈踰於此故云止也所詮中通別持犯先知名相然後釋文謂學知戒相明達持犯於一切時護本所受通望受體一無所犯不隨緣別名為通持不學無知制通篇聚隨所不了無非結罪故云通犯隨對一境方便遮防行順本受名為別持違受起非則名別犯言別有三一制法別篇聚重輕種類異故二對境別情與非情三趣男女道俗不同故三犯緣別隨戒多少不相濫故又復通別二持俱通止作通犯唯止犯別犯兼兩犯通持中前敘境通上二句通標境即總指塵沙情非情類心隨境起與理向背構善惡業故通內也又事由境生身口動作與教違順成持犯行故云通外下二句別釋上句釋通內即指化業下句釋通外即明制行身口造作故云情事如婬盜等事由教制故有順違順即二持違即兩犯但下次明持相境緣雖通今明持犯不論化業且據制行故云但令等教即律制行謂身口以教檢行約行從教故曰相循循即順也隨一一戒究盡重輕犯不犯相故云始終古師所明但不作惡即是持戒今師不爾必約動慮體達教相起行防遏方成二持安有臥地而名持戒無記非業豈得名持教行相循義意在此今明通持者止持有二一行前三心受體無污義名止持二約行心通緣受體善惡事法歷然不昧即是二持也次通犯中不學無知二罪通持犯故通重輕故通虛實故然不學非結犯有二初發心斷學隨心頓漸一一吉羅二臨境不解隨事別結若論無知隨境不了唯有別結但該篇聚得名通耳文中上二句明發心斷學修下二句明隨境無知善收二持惡兼兩犯不學之人持亦成犯望善是福愚教故罰其兩犯中則通三性不善無記一向名罰善性犯者亦兼有福如知事互用慈心歎死塔上拔草治生造像穢食供僧掘地壞生塗治塔廟之類根本罪外例加二罪今下明結罪科即判也與教相應者教即通指止作持犯行與教合無非結犯故虛謂可學實即不可學故持犯篇約二教四行可不可學歷位辨罪有無多少是也此下雙結別持犯中此約六聚根本果罪具上三義故云別也初四句示犯相正罪即目果頭治罰義兼懺悔由有犯者拒必加治順即開懺並須考實不容濫故四分果成因沒故云必令等使下二明能斷初句勘心心容疑想罪即差降實情之語通犯不犯次句明合教教無非橫故云理教則下二句獎其能斷既非妄判不乖真教同彼嘉苗不雜穢草故非蕪濫此下雙結而前不明持者翻犯顯持易故不出今明其相如婬觀不淨殺起慈悲怨逼無樂毀呰慈救等如是知之第七門約機明教標舉中若約人稟教則道通俗局若約教被人則化通行局今從後義故云立教通局教體中初科上二句示所判之繁顯理教者通目聖典如上所明有多途者大小兩乘各分三藏三學等故下二句標能判從要如戒疏中或約三輪或約化行或約化制或約制聽彼取三輪今用化行隨時用與未須和會但在古猶局於今乃通名同理異對疏可見言情求者顯義判故言分二者一代時教總歸化行開其信解用舍任緣故名化教制其修奉違反有過名為行教一謂化教此則通於道俗但汎明因果識達邪正科列示中初文上二句標名體但下示教相十不善業三惡道因十善五戒三善道因此世間因果三十七道品六度萬行是三乘因即出世因果大小雖殊行業無異隨緣開示教非定約故云汎明又經中多破外計委辨魔事指示正道恐墮邪逕故云識達又行業是因通收善惡心因冥邈故曰難知來報是果亦通苦樂果相麁著故云易述次行教中初標名體定下示教相初二句明眾行上句正示若取能秉即簡人是非若論所被並須合教如受戒遮難說恣有犯七九治罰六聚悔露一一事中皆有取捨次句釋成取捨之意謂顯佛法尊高超于世表僧門清白不容非濫住持萬載功由於此顯下二句明別行上句正示下句釋成亦同上如條部中波離對聖重條咨問意可見矣上明教有限齊反前汎明指下示其顯了反上沈密上二句示文顯下二句明事備初文如諸戒相國土犯人舉過呵責制戒牒釋方便境想下眾同別犯及不犯輕重等相一一皆然聖智通明故言不勞重覽凡愚淺識不可輒爾僣同且祖師聽二十遍猶言未是心證僧休聽三十遍尚恨逾增逾暗是知昏鄙安可自務結罪等者如婬兩結不捨戒共畜生別眾七開施衣作衣等七緣開一一通前重入戒本故云再科所判初科上二句示相濫以七支十業無別體故如環連續以喻相涉不易分故下二句標判正判中初文即約三業相對以分上三句判化教經論明心顯理是故心業以理為宗下三句判行教施為即事也律藏約事辨行故身口業以事為宗如篇聚中起業輕重受報淺深篇聚即約行起業即依化又持犯中單心三時辨犯八句重輕此依化也八殺俱重即約行也又如懺篇三品理觀即是化教六位悔法即準行教又沙彌篇凡福聖道即依化教剃落與戒即是行教餘更尋之若爾化教應不禁身口行教應不制內心答此據道眾雙稟二教為言世多不曉故為委示初約違明四句一違化不違制瞥爾貪嗔律宗不制及在家人作十不善是也二違制不違化即犯諸遮戒也三俱違犯諸生戒四俱不違理觀內照戒律外撿次約順四句一順化不順制性相唯識三觀破迷二順制不順化心無慧觀專守事戒三俱順如上第四四俱不順造業凡愚三約受戒四句一稟化不稟制淨名云汝但發心即名具足是二稟制不稟化自智不明循律軌度三俱稟心希出離受律禁戒趣向聖道佛世利根善來三語即得道果又涅槃出家菩薩是也四俱不稟可知四約懺罪四句一化淨制不淨如犯篇聚理觀明照達罪性空而不依律懺縱得好相不入淨僧二制淨化不淨犯依律悔而無觀慧但滅違制業性確然三俱淨篇聚依教滅業道任靜思四俱不淨愚者犯不肯懺問化行二教為大為小答化收大小制唯局小若爾梵網善戒大乘行教那判為化答大乘三藏制不制別得名為行若望今宗還屬於化以菩薩戒通道俗故問五八二戒既是戒制應是行攝然局俗人不通兩眾如何判之答化教所攝律中明者隨律之經引證如別如是簡判略識化行更須精辨恐繁且止今時學者尚不知名況明行相若不曉此大小三藏一切皆迷罪異中上二句明在家為惡出家亦有犯者如獨頭心念是下二句明出家毀戒犯化不必違行違行必兼犯化業外加制故云重也問性戒可爾遮非本惡為有幾罪如壞生掘地非不違慈畜長捉寶寧無貪染來者有智請為通之又問化教亦兼事行豈無身口行教通禁三業豈不明心何以上文離開三業以配兩教亦請答之故下引證即善生經彼明二人同作一罪受戒者重不受者輕智論文同如懺篇引徵意中初躡上經文以為徵詞謂彼經既顯此不須分恐下示所為上句指迷言宗體者即上所判也次句遮妄言是非者化行相濫也世聞淨名發心即是具足妄判戒之有無或迷三性犯制乃謂業均一品或云營福違戒無過或執心觀便毀律儀或謂堅持無勞慧觀或依方等二懺而云制罪都亡或依篇聚六治乃謂性業皆滅故有依大教懺夷足小乘僧數如斯迷濫從古至今至下懺篇更為廣說故下明今立通及後世無復謬濫故云永用等蠲簡也標宗僧網懺法沙彌等皆辨二教臨文詳之第八門前門人法並通此門並局以人唯二眾教局行科然而報相兩殊故使教分同別故須辨示方見諸篇通塞中初文同戒即止持戒本初篇四重二篇七戒三十中十八九十中六十九眾學一百七滅諍也同制謂作持諸法具諸門者同戒在中卷同制則上下二卷其全同者則無別舉如集僧與欲羯磨僧網之類少有異者隨事點示如結界中尼界二里有難同僧捨戒中明尼無再受受日中尼唯七日二衣中尼加二衣之類上通明兩同若下別顯同戒上文指易戒本分者即律廣文隱下顯難隨相即中卷如離衣中三衣五衣皆提眾學中通示尼等同犯又篇聚中示尼八重又持犯境想云尼中非無亦指同僧通緣中總標五眾之類次明塞中前明止行初句標示約位戒即與僧異者八夷後四十七殘中十戒三十中十二單提中一百九八提舍尼尋尼戒本對之可見謂下釋異文列三句例括異戒略為引之轉重不同中三初僧殘六戒漏失二麁二房僧重尼輕摩觸僧輕尼重殘篇唯有此句二捨墮九戒五敷為五六取尼衣七浣故衣八擔羊毛九擗羊毛並尼吉僧提三單提十三戒一為尼作衣二與尼衣三屏坐四期尼行五期同船六期女行七受贊食八勸足食九索美食十牙角針筒十一過量坐具十二覆瘡衣十三佛衣等量並僧提尼吉有無互缺中二初捨墮尼無二戒一過前求雨衣二蘭若離衣二單提尼無三戒一輒教尼二說法日暮三譏呵教尼人犯同緣異亦二初捨墮一戒長鉢同提僧開十日尼止一夜二單提五戒結罪同提緣相有異一背請二足食二戒合為一制三與外道食兼白衣男四與年不滿二年學法五雨衣常開上約鈔疏以明更以義求八夷後四及二不定即是有無八提舍尼四八相望亦即有無對索美食即同輕重而下指尼篇如上多異不可盡列故選時要方入別行盛行謂數犯難知謂微隱互專一義亦所不出即如下篇上列六戒夷中出三觸八及覆殘中出二言人四獨單提出紡績一戒及下一句示作行言眾行者下列七門上即隨戒一門餘之六種并屬眾行謂受懺說恣安居師資也方下總指結意中上二句結前分宗類者即向所明通塞條別未顯來詮者不明立教同別來意也諸下指廣不同意者即上止作別相各有所以大疏即祖師所稟首師律疏二十卷而言大者或隨大部為言或簡今家戒業二疏非謂尊師故也今見義鈔戒疏不能廣錄學者自尋第九門標云異同有二初明沙彌即對大僧下明式叉即望三眾沙彌中初科上句標名沙彌是梵語此云息慈息其世染慈濟群生若下明體同檢下示相局就下明行遍等塵沙者副本體故下云除羯磨一法不在數例自餘眾行並制同修等結下明犯第五篇即突吉羅無論遮性一概結吉示教輕故就下顯位諸戒末者即指廣律並列戒後別尊卑故問體既是同那分大小答境量雖同志願碩異有願無願豈不明乎若爾既遍塵沙何唯列十答若論戒體發在三歸後說十戒略陳其相如大僧四重之例故下云且列十戒喜犯前標餘所未知二師別教等辨異中言自外者如五德十數持衣說淨別堂說恣有緣掘壞之類並如下篇事容是非故云取捨沙彌如本篇沙彌尼附尼法故云各就等次式叉中初文上句標名此云學法女由尼報弱就小學中別提六行為具方便二年則驗胎有無六法則顯行貞固十誦所謂練身練心即此義也六法下明體同沙彌自下明行同三眾六法者一摩觸二盜四錢三殺畜四小妄五非時食六飲酒學宗謂行本也言學有三一學根本謂四重也二學法即六法也三學行一切大尼行不重發者以式叉尼轉根為男即入僧沙彌故業疏云此學法女無戒體也但受別教位過沙彌以人不解謂分三眾有三戒體等問沙彌尼戒既遍塵沙何以式叉方行此六答選其喜犯重更約勒無體再發即其義矣同三眾者指下文也同大僧則具在諸篇同大尼沙彌則各如別篇沙彌合一故言三眾別行中如無沙彌尼得與大尼授食之類下文具委第十門標分中鈔者祖師自號也引下三句即括三科但科酌之言對下少異然下云鈔興但明抄略之意此言科酌正明量處之謀前後異名共成一意言正經者正謂入諸正錄經者訓法訓常名兼通別通該三藏別在修多今此從通以收群部小乘律論中又三初明諸律具云摩訶僧祇此翻大眾從眾為名即窟內部曇無德亦云曇摩毱多此翻法正亦云法護法鏡法密從人為目薩婆多或云薩婆諦婆此云有亦云一切有從計為名彌沙塞此云不著有無觀迦葉遺亦云迦葉毘此云重空觀此二從行為名婆麁富羅亦名婆蹉富羅此云著有行亦從計名上列六部前之四部戒本廣律此土已翻即根本獲一五部得三翻傳時代備如戒疏下之二部據非今鈔所引相因列之知名而已註云依大集者義鈔所引三藏口傳及遺教法律並以僧祇列為五部所出不同故此示之毘尼下次列諸論此科所列名為律論亦名戒論婆沙成實等自屬經論昔人不曉例云小乘論傳濫久矣多論下注并傳者即師資傳了論注云釋正量部者此亦上座部中分出律本不到比方即了論所宗也真諦即陳朝翻經三藏出疏五卷解釋了論其文未流東南五百問法亦云五百問事經出要律儀梁武帝集凡二十卷自下三指廣如三千威儀毘跋律決正二部律論等皆律之部類有云二部十八二十部或云遺教愛道經等皆非次經論中二論亦即大小此總化教結略中費長房後周高僧周武滅法遂為翻經學士隋文帝開皇十七年撰歷代三寶錄凡十五卷今見大藏次明異執標中有人謂聰覆二師首傳四分祖師不合科為異執今謂異執之言目其各計有何毀斥縱容妄解豈不思所稟首師亦列于後又前云五部異執則所宗部主亦在其中又何獨黨於聰覆耶非聖人者無法即斯人也列示中所列諸師並出續高僧傳古記廣引今不同之若依寫取此復何難但恐徒喪時功糅雜鈔旨必欲知者取傳尋之今但列名略注師稟耳法聰元魏朝人本學僧祇初弘四分傳論云自初開律師號法聰是也道覆聰師弟子聰但口傳覆乃作疏六卷傳論云但是長科至於義舉未聞于世慧光自光至𭿞皆北齊人光依覆學初製疏十卷後裁為四卷故云兩出洪理抄二卷曇隱抄四卷道樂鈔四卷三師並光師弟子洪遵初依道雲學後聽暉講為國僧統故以為名洪淵稟尋遵師後撰疏未四多少道雲疏九卷抄一卷道暉疏七卷法願上三師並光門人願即隋朝人疏十卷抄二答道洪法勝智首並隋朝人依洪聽習首即祖師所承法礪洪淵弟子祖師亦甞從學一月而終今疏猶存基師僧傳不書結指中曇瑗陳朝人僧祐梁朝人即祖師前身二師並先學十誦後傳四分未詳撰述靈裕隋朝人疏五卷江表表即外也或云江外江左並指吳越在江漢之外故也關內即京非河南即洛陽蜀部即東西兩川指義鈔者未見其文上來所明並是所鈔即前序云包異部等四句收之可見又異執中傳演雖多不出六見亦如上引次明為經者一世多不辨隨得濫用二事乖正典反為執據如三百福罰三十六碩餘糧五部五色衣以錢贖佛食等並如下破今宗引用並據真文使來學生信行事無疑此章之來意如此矣列示中經論參列凡二十五本經有十四論有十一其間諸佛下生乳光提謂並有真偽二本他宗或引並正本耳結斥可知隋帝勅令長房錄中所不收者並集焚毀搜之不盡當時猶用故此斥之然尼鈔義鈔或復引用未詳何意鈔興中標云本意者下云臨機有用等是正明中初科攢多歸少曰撮略舉一總眾名包括餘如前解次科智謂識見量即器度侮曼也猷言即自所鈔猷法也空有二十雙亦雙非四執相攻名為戲論今采摭眾典取捨諸家恐疑同彼故須遮之正示中初文上句推其師受顯非自裁次句呈於已懷明須去取每下正敘刪削初二句示撿討覆謂反覆於下四句明所刪一事舉少類多一事尚然況一部行事其繁可知文中繁有二重一廢立多者約諸家相望也二情見繁者就諸家自論也今下示能刪此亦有二一者全除刪如受戒法及十三難羯磨戒本等並廣列義門今鈔不錄二者對破刪如下但云諸說不同昔解多途廢昔義等而不委引彼說者是如自然界體廣狹方圓三小立相安居受日等並多古解一一標破此但直申今義即引誠教證令取信故云今並等且引一事餘準明之如下問云自然界為方圓耶答云昔云定方下引彼說即刪略也下引十誦本律丘分善見了論等文仍云廣引誠證定方須廢此謂止存文證首題刪繁文唯據此如上所示想無惑矣指餘義中然今此鈔雖並刪略諸師申釋未必全非或義章開其戶牖或問答釋於幽微何以此中一概除削文明此意據合存之止由難解不逗新學故別為一部目為義鈔文有三卷下卷已亡故今所指彼文多闕義鈔興致明文在茲古多妄說或云二疏之餘或云二疏張本如別所破具云拾毘尼義鈔此中語省以集字代之下單云義鈔別鈔皆此例也文中通猶容也餘論即目義解容彼之說明其可存上二句明義之幽隱自下二句明不益初心言通解者以目博知深識之士具下正指彼文明不具中遮世疑云三藏正教義無改作何以引用輒有去取故此釋之仍引證據初明取意堪入宗者涉今行事也自下指所餘撮要包括是鈔所宗橫評繁文即今所諱故云非鈔者意也故下引證初引本律出三十四卷次引母論文出第六並因比丘為人說法不能廣說白佛故聽律文具引論略白語要謂精當該攝妙即善巧適機示所為者即鈔興意也庶望也訪問也上明法有倫序不假他求下顯事有準承無疑得失臨機有用即事即行二句偶對語別義同此之四句一部大宗獨異諸師高超九代盡如來權巧之旨闢群生解脫之門三寶所以住持五乘所以發軫者功在於茲矣是以行事之目標在首題訓蒙之詞遍于一部凡為道眾率由此門禪教雖殊無不受賜曲尋弘濟可勝言哉遮妄增者此即聖意懸鑒未來各興解釋必乖本趣故此止之初敘妄增不急務者即世現行諸家章記或廣張法相或多雜俗書顛覆祖宗繄昏智眼請詳聖訓自可鑒之使下次顯過患上句明壞教今鈔始終盡稽聖典故曰真宗次句明迷行教行兩亡則破戒造惡非沙門行如鳥鼠焉此出佛藏經彼明比丘不修戒行非道非俗猶如蝙蝠非鳥非鼠具引如篇聚中意謂此鈔既興人知持奉由彼穢雜後進還迷故云復存也茲日通指斯時即今學者專攻章記爭馳講論以為己能身作重夷口護輕吉自謂精明盜相反侵損於四方善達婬科更荒迷於三道昏飡饜飫尚說過中夕飲酕醄猶談酒制人前斂相詐現威容屏處為非略無畏忌此徒擊目豈是誣言良由章記之乖訛復是師承之庸鄙不令教於不令一盲導於眾盲皇祖真宗於茲殆絕一尋此意不覺嗟呼因筆斯文益增哽痛自非聖鑒孰見余心悲夫總結中上三句結前言總束者則驗十門非別序明矣諸門者即下諸篇則顯教興中指諸門非九門明矣析辨也若下指廣可知別論者則三十篇望序為別又復明矣大段第三示所詮行相初總示中宅居也佛門廣大包納清澄喻之如海僧稟佛化即居其中如犯重禁名為邊罪謂漂出佛海邊外即其義也流即是水法能滋物故比於水廁預也伍眾也此明比丘身具三寶所修法行雖乃萬途以眾自共攝無不盡然據行體止是二持但就作中別簡一色羯磨僧法以為眾行自餘雜法總歸共行欲使綱目兩分眾別無濫故云唯三位也別對中初明自行上句明建志攝修次句示學知教相出離聖道不類邪術故云正戒文指體相必具法行體附釋相相總四篇故此二字統於中卷自下次明眾行上句𨃃前次句正示凡行僧事必先簡眾故須體淨方應秉宣言綱領者對下毛目也匡攝住持存乎眾法隨事奉修在乎別行眾法存則別行修綱領舉則毛目正上下作持離分在此自他下明共行上句示行相凡為道眾彼我同須即是共義故云兩德德亦行也下句顯繁多除僧法羯磨已外一切作行皆歸共收唯此共行攝相最廣故曰多途或可上句躡前兩行次句正示行相謂必須共行輔成自眾故云成相多途問自眾兩行亦制同遵豈非相濫答自行則護體防心義非他共止作體別此不在言就論眾行作業辦事多是為他義非常行有緣方舉共行不爾日用恒須是僧俱稟獨彰斯目如衣藥鉢器計請導俗等類比論二行別相可知然三行之目古德所傳若取今文明標自行又復前云上卷則攝於眾務則自眾二行名義灼然唯斯共行雖復無文兩德之言義取無爽古多妄解不免繁詞古云四人羯磨為眾行一人心念為自行二人對首為共行者誤矣問前文已分何意重迷答前判能詮則以文攝行此明所詮則指行在文雖文行俱明而正意兩別問前以上卷在初此則中卷為首何以不同答意如上解若爾何不依行次第以自行為上卷耶答此有二意一約行次第則先止後作自行合初二約事勝劣則住持功大眾須在首故律序云以眾和合故佛法得久住今取後意如文所列雙結中教行兩備攝機斯盡次科初二句標難謂事隨篇類則使三行互有投寄如上卷標宗亦明法體行相及捨戒六念別人說恣識疑發露之類則眾行兼自共也又中卷懺六聚中眾別悔法則自行兼眾共也下卷攝衣攝食亡物等諸羯磨法并雜行等則共行兼眾自也三行相參不可一判故云難也若下釋其難相成繁闕過上二句示闕略過長途散釋者謂不約三行收束也寡討論者謂不稱機宜也以言無所歸人難披撿故下二句明傷繁過言曲分者謂逐卷隨篇明三行簡判也過在繁碎者亂於教旨也三中初示今判上二句正示對翻兩過隨宜者離前寡討論過也約略者相前曲分也通結者謂大分三行翻上散釋也指歸者雖有相投舉行攝屬離上繁碎過也下二句顯意使謂令於後人也綱領即三行毛目即諸篇行相整理也載下結勸上句勸學開其解也下句勸修成其行也載即重也
